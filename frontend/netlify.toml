[build]
  command   = "npm run build"
  publish   = "dist"

# Required for React Router — serve index.html for all routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security & CORS headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # CSP — allows Firebase popup auth (signInWithPopup needs accounts.google.com frame + postMessage)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://www.gstatic.com https://*.firebaseapp.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://evora-api.onrender.com wss://evora-api.onrender.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://*.firebaseapp.com https://firebaseinstallations.googleapis.com https://apis.google.com https://accounts.google.com https://oauth2.googleapis.com; img-src 'self' data: blob: https://upload.wikimedia.org https://commons.wikimedia.org https://*.wikimedia.org https://images.unsplash.com https://evora-api.onrender.com https://lh3.googleusercontent.com https://*.googleusercontent.com https://www.gstatic.com; frame-src 'self' https://www.google.com https://maps.google.com https://www.youtube.com https://accounts.google.com https://*.firebaseapp.com https://apis.google.com; worker-src 'self' blob:;"
    Access-Control-Allow-Origin = "*"
