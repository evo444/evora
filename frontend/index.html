<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Evora — Kerala Events Hub</title>
    <meta name="description" content="Discover every event happening across Kerala — festivals, concerts, tech, culture, sports and more." />
    <meta name="keywords" content="Kerala events, Kerala festival, Thrissur Pooram, Onam, Kochi events, cultural events Kerala" />
    <meta name="theme-color" content="#22c55e" />

    <!-- Open Graph -->
    <meta property="og:title" content="Evora — Kerala Events Hub" />
    <meta property="og:description" content="Discover every event happening across Kerala." />
    <meta property="og:type" content="website" />

    <!-- Favicon (emoji SVG — works on all modern browsers) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌴</text></svg>" />

    <!-- Font: Inter Variable (one file covers all weights 100–900, faster than separate weight files) -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the font so it doesn't cause layout shift -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.jsx"></script>
  </body>
</html>
