services:
  - type: web
    name: evora-api
    env: node
    region: singapore   # closest to Kerala
    plan: free
    buildCommand: npm install && npm install --prefix ../frontend --include=dev && npm run build --prefix ../frontend
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false           # set in Render dashboard
      - key: VITE_API_URL
        value: https://evora-api.onrender.com
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
